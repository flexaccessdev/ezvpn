name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_title: ${{ steps.tag.outputs.release_title }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Tag
        id: tag
        run: |
          # Tag and name are always derived from the Cargo.toml version so the flow is
          # uniform across releases and prereleases. Whether it's a prerelease is decided
          # purely by the branch this workflow runs against (anything other than main).
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::Could not parse version from Cargo.toml"
            exit 1
          fi
          echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "release_title=Prerelease v$version" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_title=Release v$version" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.tag.outputs.release_tag }}" | grep -q .; then
            echo "::error::Tag ${{ steps.tag.outputs.release_tag }} already exists on remote"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Clean up any leftover draft from a previous failed run with the same tag.
          # A draft release doesn't create the git tag on the remote, so a stale draft is the
          # only thing that can collide here (real published tags are caught by the step above).
          if gh release view "${{ steps.tag.outputs.release_tag }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.tag.outputs.release_tag }}"
            gh release delete "${{ steps.tag.outputs.release_tag }}" --yes
          fi
          args=()
          if [ "${{ steps.tag.outputs.is_prerelease }}" = "true" ]; then
            args+=(--prerelease)
          else
            # Generate notes against the previous *stable* release, not the latest prerelease.
            prev_stable=$(gh release list --exclude-pre-releases --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // empty')
            if [ -n "$prev_stable" ]; then
              args+=(--notes-start-tag "$prev_stable")
            fi
          fi
          gh release create "${{ steps.tag.outputs.release_tag }}" \
            --draft \
            --target "${{ github.sha }}" \
            --title "${{ steps.tag.outputs.release_title }}" \
            --generate-notes \
            "${args[@]}"

  build-linux:
    needs: setup
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename
        run: mv target/${{ matrix.target }}/release/ezvpn target/release/ezvpn-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: target/release/ezvpn-${{ matrix.suffix }}

  build-macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Rename
        run: mv target/aarch64-apple-darwin/release/ezvpn target/release/ezvpn-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: target/release/ezvpn-macos-arm64

  build-ios:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build iOS xcframework + header
        # build-ios.sh installs the iOS Rust target if missing, builds the
        # device slice, and stages libezvpn.xcframework + the C header into
        # dist/ios. That zip becomes the release asset the iOS project's Swift
        # package (Packages/Ezvpn/Package.swift) downloads by default.
        run: ./build-ios.sh release
      - name: Package xcframework + header
        # Zip the bundle directory and ship the header alongside it so the vendor
        # drop is one self-contained archive (the header is also embedded in the
        # slice, but a top-level copy is convenient for the Xcode project).
        run: |
          cd dist/ios
          zip -r libezvpn-ios.xcframework.zip libezvpn.xcframework ezvpn.h
      - uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: dist/ios/libezvpn-ios.xcframework.zip

  build-windows:
    needs: setup
    if: needs.setup.outputs.is_prerelease == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Rename
        run: move target\x86_64-pc-windows-msvc\release\ezvpn.exe target\release\ezvpn-windows-amd64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: target/release/ezvpn-windows-amd64.exe

  publish-release:
    needs: [setup, build-linux, build-macos, build-ios, build-windows]
    if: always() && needs.setup.result == 'success' && needs.build-linux.result == 'success' && needs.build-macos.result == 'success' && needs.build-ios.result == 'success' && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.setup.outputs.release_tag }}" artifacts/* --clobber

      - name: Publish release (remove draft, creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.setup.outputs.release_tag }}" --draft=false
